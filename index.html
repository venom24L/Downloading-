<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helicopter Rotor Spin-Up & Takeoff</title>
    <style>
        :root {
            --bg: #1a1a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            position: relative;
            width: 95vw;
            max-width: 1000px;
            aspect-ratio: 1000 / 620;
            border-radius: 18px;
            overflow: hidden;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.08);
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 18px;
        }

        .info-overlay {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            pointer-events: none;
            transition: opacity 0.6s;
            opacity: 0.85;
        }

        .phase-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ffb347;
            padding: 6px 16px;
            border-radius: 14px;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            font-weight: 600;
            pointer-events: none;
            transition: all 0.4s;
            opacity: 0;
            text-transform: uppercase;
        }
        .phase-indicator.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas" width="1000" height="620"></canvas>
        <div class="phase-indicator" id="phaseIndicator"></div>
        <div class="info-overlay">🚁 Rotor Spin-Up & Vertical Takeoff</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const phaseIndicator = document.getElementById('phaseIndicator');
            const W = canvas.width;
            const H = canvas.height;

            // ──────────────────────────────────────
            // CONFIGURATION
            // ──────────────────────────────────────
            const GROUND_Y = 470; // Ground surface level
            const HELI_INITIAL_CX = 480; // Helicopter body center X
            const HELI_INITIAL_CY = 370; // Helicopter body center Y
            const ROTOR_HUB_OFFSET_Y = -72; // Rotor hub relative to body center
            const BLADE_LENGTH = 178; // Main rotor blade length
            const BLADE_WIDTH = 11; // Blade chord width
            const MAX_ROTOR_SPEED = 0.38; // Radians per frame at ~60fps (~230 RPM)
            const TAIL_ROTOR_SPEED_MULT = 5.2; // Tail rotor spins this many times faster
            const LIFT_OFF_HEIGHT = 210; // How high the helicopter rises (px)

            // ──────────────────────────────────────
            // ANIMATION STATE
            // ──────────────────────────────────────
            let rotorAngle = Math.random() * Math.PI * 2;
            let rotorSpeed = 0.015; // Start barely spinning
            let targetRotorSpeed = 0.015;
            let tailRotorAngle = Math.random() * Math.PI * 2;
            let heliY = HELI_INITIAL_CY;
            let heliX = HELI_INITIAL_CX;
            let shakeAmplitude = 0;
            let verticalVelocity = 0;
            let liftOffActive = false;
            let liftOffProgress = 0;
            let particles = [];
            let time = 0;
            let phaseStartTime = 0;
            let currentPhase = 'idle';
            let phaseTimer = 0;
            let smokeParticles = [];

            // ──────────────────────────────────────
            // PHASE SYSTEM
            // ──────────────────────────────────────
            const phases = {
                idle: { duration: 1.2, next: 'spooling', label: 'Engine Start' },
                spooling: { duration: 3.8, next: 'fullPower', label: 'Spooling Up' },
                fullPower: { duration: 2.0, next: 'shaking', label: 'Full Power' },
                shaking: { duration: 1.4, next: 'liftOff', label: 'Ready for Takeoff' },
                liftOff: { duration: 4.5, next: 'hovering', label: 'Lifting Off' },
                hovering: { duration: 999, next: 'hovering', label: 'Hovering' },
            };

            function setPhase(phaseName) {
                currentPhase = phaseName;
                phaseTimer = 0;
                phaseStartTime = time;
                const label = phases[phaseName]?.label || '';
                phaseIndicator.textContent = label;
                if (label) {
                    phaseIndicator.classList.add('visible');
                } else {
                    phaseIndicator.classList.remove('visible');
                }
                // Fade out indicator after a moment
                clearTimeout(phaseIndicator._timeout);
                phaseIndicator._timeout = setTimeout(() => {
                    phaseIndicator.classList.remove('visible');
                }, 2200);
            }

            // ──────────────────────────────────────
            // PARTICLE SYSTEM (DUST)
            // ──────────────────────────────────────
            function spawnDustParticle(groundX, groundY, intensity) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (0.5 + Math.random() * 3.5) * intensity;
                const life = 0.6 + Math.random() * 2.2;
                return {
                    x: groundX + (Math.random() - 0.5) * 30 * intensity,
                    y: groundY - Math.random() * 8,
                    vx: Math.cos(angle) * speed,
                    vy: -Math.random() * 2.5 * intensity - 0.3,
                    size: 0.6 + Math.random() * 3.5 * intensity,
                    opacity: 0.35 + Math.random() * 0.65,
                    life: life,
                    maxLife: life,
                    color: Math.random() < 0.5 ?
                        { r: 180 + Math.random() * 50, g: 155 + Math.random() * 40, b: 115 + Math.random() * 35 } :
                        { r: 200 + Math.random() * 40, g: 175 + Math.random() * 35, b: 140 + Math.random() * 30 },
                };
            }

            function spawnSmokeParticle(x, y) {
                return {
                    x: x + (Math.random() - 0.5) * 16,
                    y: y,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: -0.4 - Math.random() * 1.2,
                    size: 2 + Math.random() * 7,
                    opacity: 0.25 + Math.random() * 0.4,
                    life: 1.2 + Math.random() * 2.5,
                    maxLife: 1.2 + Math.random() * 2.5,
                    color: { r: 160, g: 150, b: 140 },
                };
            }

            // ──────────────────────────────────────
            // HELICOPTER DRAWING FUNCTIONS
            // ──────────────────────────────────────
            function drawHelicopterBody(context, cx, cy) {
                context.save();
                context.translate(cx, cy);

                // ── Shadow on fuselage underside ──
                // (drawn as part of the body for depth)

                // ── TAIL BOOM ──
                context.fillStyle = '#e8e4df';
                context.beginPath();
                context.moveTo(-28, -22);
                context.lineTo(-155, -44);
                context.lineTo(-165, -36);
                context.lineTo(-160, -28);
                context.lineTo(-32, -6);
                context.closePath();
                context.fill();

                // Tail boom lower accent (red)
                context.fillStyle = '#c0392b';
                context.beginPath();
                context.moveTo(-32, -6);
                context.lineTo(-160, -28);
                context.lineTo(-158, -18);
                context.lineTo(-30, 4);
                context.closePath();
                context.fill();

                // Tail boom top highlight
                context.fillStyle = '#f5f3f0';
                context.beginPath();
                context.moveTo(-28, -22);
                context.lineTo(-155, -44);
                context.lineTo(-148, -50);
                context.lineTo(-22, -28);
                context.closePath();
                context.fill();

                // ── MAIN FUSELAGE ──
                // Lower body (red)
                context.fillStyle = '#d4342e';
                context.beginPath();
                context.moveTo(55, 8);
                context.quadraticCurveTo(30, 35, -10, 30);
                context.quadraticCurveTo(-40, 26, -55, 10);
                context.lineTo(-40, -8);
                context.quadraticCurveTo(-5, -18, 35, -10);
                context.quadraticCurveTo(60, -2, 65, 14);
                context.closePath();
                context.fill();

                // Upper body (white/cream)
                context.fillStyle = '#f9f7f4';
                context.beginPath();
                context.moveTo(58, 6);
                context.quadraticCurveTo(35, -20, -5, -28);
                context.quadraticCurveTo(-35, -28, -52, -15);
                context.lineTo(-38, -22);
                context.quadraticCurveTo(-12, -36, 25, -28);
                context.quadraticCurveTo(55, -16, 64, 2);
                context.closePath();
                context.fill();

                // Fuselage side panel / stripe
                context.fillStyle = '#1a3a5c';
                context.beginPath();
                context.moveTo(56, 1);
                context.lineTo(-42, -12);
                context.lineTo(-44, -5);
                context.lineTo(54, 6);
                context.closePath();
                context.fill();

                // ── NOSE CONE ──
                context.fillStyle = '#f5f2ed';
                context.beginPath();
                context.moveTo(58, -6);
                context.quadraticCurveTo(78, -14, 90, -6);
                context.quadraticCurveTo(82, 8, 64, 12);
                context.quadraticCurveTo(55, 4, 58, -6);
                context.fill();

                // Nose highlight
                context.fillStyle = '#ffffff';
                context.beginPath();
                context.arc(78, -4, 11, -0.7, 0.6, false);
                context.fill();

                // ── COCKPIT WINDOWS ──
                // Main windshield
                const glassGrad = context.createLinearGradient(35, -20, 65, -5);
                glassGrad.addColorStop(0, '#334e6b');
                glassGrad.addColorStop(0.4, '#5b7fa3');
                glassGrad.addColorStop(0.7, '#8ab4d8');
                glassGrad.addColorStop(1, '#4a6d8c');
                context.fillStyle = glassGrad;
                context.beginPath();
                context.moveTo(42, -14);
                context.quadraticCurveTo(55, -22, 68, -16);
                context.lineTo(66, -4);
                context.quadraticCurveTo(52, -6, 40, -6);
                context.closePath();
                context.fill();

                // Windshield frame highlight
                context.strokeStyle = 'rgba(255,255,255,0.5)';
                context.lineWidth = 1.2;
                context.beginPath();
                context.moveTo(42, -14);
                context.quadraticCurveTo(55, -22, 68, -16);
                context.stroke();

                // Side window
                context.fillStyle = '#4b7396';
                context.beginPath();
                context.moveTo(30, -12);
                context.quadraticCurveTo(42, -18, 50, -12);
                context.lineTo(48, -4);
                context.quadraticCurveTo(38, -3, 28, -4);
                context.closePath();
                context.fill();

                // Window reflection
                context.fillStyle = 'rgba(255,255,255,0.25)';
                context.beginPath();
                context.moveTo(44, -16);
                context.lineTo(52, -12);
                context.lineTo(48, -7);
                context.lineTo(40, -10);
                context.closePath();
                context.fill();

                // ── ENGINE HOUSING (top rear) ──
                context.fillStyle = '#e0dcd6';
                context.beginPath();
                context.moveTo(-18, -26);
                context.quadraticCurveTo(-35, -34, -48, -28);
                context.lineTo(-44, -18);
                context.quadraticCurveTo(-28, -20, -14, -18);
                context.closePath();
                context.fill();
                context.fillStyle = '#c8c4bd';
                context.beginPath();
                context.moveTo(-20, -24);
                context.quadraticCurveTo(-35, -30, -44, -26);
                context.lineTo(-42, -22);
                context.quadraticCurveTo(-30, -23, -18, -20);
                context.closePath();
                context.fill();

                // Engine intake
                context.fillStyle = '#2c2c2c';
                context.beginPath();
                context.ellipse(-30, -28, 7, 4, -0.2, 0, Math.PI * 2);
                context.fill();
                context.fillStyle = '#1a1a1a';
                context.beginPath();
                context.ellipse(-30, -28, 4, 2.5, -0.2, 0, Math.PI * 2);
                context.fill();

                // ── ROTOR MAST / HUB BASE ──
                context.fillStyle = '#5a5a5a';
                context.beginPath();
                context.moveTo(-8, -25);
                context.lineTo(8, -25);
                context.lineTo(6, -36);
                context.lineTo(-4, -36);
                context.closePath();
                context.fill();
                context.fillStyle = '#707070';
                context.beginPath();
                context.rect(-3, -40, 8, 5);
                context.fill();

                // ── TAIL SECTION ──
                // Vertical stabilizer
                context.fillStyle = '#e8e4df';
                context.beginPath();
                context.moveTo(-148, -44);
                context.quadraticCurveTo(-158, -68, -168, -56);
                context.lineTo(-170, -40);
                context.quadraticCurveTo(-162, -36, -155, -38);
                context.closePath();
                context.fill();
                context.fillStyle = '#d4342e';
                context.beginPath();
                context.moveTo(-152, -42);
                context.quadraticCurveTo(-160, -58, -166, -52);
                context.lineTo(-167, -42);
                context.quadraticCurveTo(-160, -38, -154, -38);
                context.closePath();
                context.fill();

                // Horizontal stabilizer
                context.fillStyle = '#e0dcd6';
                context.beginPath();
                context.moveTo(-130, -30);
                context.lineTo(-145, -30);
                context.lineTo(-148, -22);
                context.lineTo(-132, -22);
                context.closePath();
                context.fill();

                // Tail rotor housing
                context.fillStyle = '#6a6a6a';
                context.beginPath();
                context.arc(-167, -38, 7, 0, Math.PI * 2);
                context.fill();
                context.fillStyle = '#555';
                context.beginPath();
                context.arc(-167, -38, 3.5, 0, Math.PI * 2);
                context.fill();

                // ── LANDING SKIDS ──
                // Rear strut
                context.fillStyle = '#4a4a4a';
                context.beginPath();
                context.moveTo(-20, 28);
                context.lineTo(-16, 52);
                context.lineTo(-8, 52);
                context.lineTo(-10, 28);
                context.closePath();
                context.fill();
                // Front strut
                context.beginPath();
                context.moveTo(20, 22);
                context.lineTo(26, 52);
                context.lineTo(34, 52);
                context.lineTo(30, 22);
                context.closePath();
                context.fill();

                // Skid tubes
                context.fillStyle = '#3a3a3a';
                context.beginPath();
                context.roundRect(-28, 48, 75, 7, 3.5);
                context.fill();
                context.fillStyle = '#555';
                context.beginPath();
                context.roundRect(-26, 49, 71, 3, 1.5);
                context.fill();

                // Skid caps
                context.fillStyle = '#333';
                context.beginPath();
                context.arc(-24, 51.5, 4, 0, Math.PI * 2);
                context.fill();
                context.beginPath();
                context.arc(42, 51.5, 4, 0, Math.PI * 2);
                context.fill();

                // ── EXHAUST ──
                context.fillStyle = '#3a3a3a';
                context.beginPath();
                context.ellipse(-38, -10, 6, 3, 0.1, 0, Math.PI * 2);
                context.fill();
                context.fillStyle = '#1a1a1a';
                context.beginPath();
                context.ellipse(-38, -10, 3.5, 1.8, 0.1, 0, Math.PI * 2);
                context.fill();

                // ── SMALL DETAILS ──
                // Door line
                context.strokeStyle = 'rgba(0,0,0,0.2)';
                context.lineWidth = 1;
                context.beginPath();
                context.moveTo(15, -8);
                context.lineTo(15, 18);
                context.stroke();

                // Panel line on tail boom
                context.strokeStyle = 'rgba(0,0,0,0.15)';
                context.lineWidth = 0.8;
                context.beginPath();
                context.moveTo(-55, -16);
                context.lineTo(-55, 6);
                context.stroke();

                // Antenna on top
                context.strokeStyle = '#555';
                context.lineWidth = 1.5;
                context.beginPath();
                context.moveTo(-8, -36);
                context.lineTo(-10, -50);
                context.stroke();
                context.fillStyle = '#ff4444';
                context.beginPath();
                context.arc(-10, -51, 2.5, 0, Math.PI * 2);
                context.fill();

                // Navigation light on tail
                context.fillStyle = '#ff3333';
                context.beginPath();
                context.arc(-166, -34, 2, 0, Math.PI * 2);
                context.fill();
                context.shadowColor = '#ff0000';
                context.shadowBlur = 4;
                context.fill();
                context.shadowBlur = 0;

                context.restore();
            }

            function drawMainRotor(context, cx, cy, angle, speed, blurFactor) {
                const hubX = cx;
                const hubY = cy + ROTOR_HUB_OFFSET_Y;

                context.save();

                // ── ROTOR DISC (motion blur at high speed) ──
                if (blurFactor > 0.15) {
                    const discAlpha = Math.min(0.55, blurFactor * 0.7);
                    const discGrad = context.createRadialGradient(hubX, hubY, BLADE_LENGTH * 0.08, hubX, hubY, BLADE_LENGTH);
                    discGrad.addColorStop(0, 'rgba(200,210,220,0)');
                    discGrad.addColorStop(0.08, 'rgba(190,200,215,0.05)');
                    discGrad.addColorStop(0.3, `rgba(170,185,200,${discAlpha * 0.5})`);
                    discGrad.addColorStop(0.7, `rgba(150,165,185,${discAlpha * 0.75})`);
                    discGrad.addColorStop(0.88, `rgba(140,155,175,${discAlpha})`);
                    discGrad.addColorStop(0.96, `rgba(160,175,190,${discAlpha * 1.1})`);
                    discGrad.addColorStop(1, 'rgba(180,195,210,0)');
                    context.fillStyle = discGrad;
                    context.beginPath();
                    context.arc(hubX, hubY, BLADE_LENGTH, 0, Math.PI * 2);
                    context.fill();
                }

                // ── DRAW BLADES ──
                const numBladeSets = 1 + Math.floor(blurFactor * 16);
                for (let set = 0; set < numBladeSets; set++) {
                    const offsetAngle = (set / numBladeSets) * Math.PI * 0.5;
                    const alpha = set === 0 ? 0.9 : Math.max(0.03, (1 - blurFactor) * 0.5 / numBladeSets);
                    if (alpha < 0.02 && set > 0) continue;

                    for (let i = 0; i < 4; i++) {
                        const bladeAngle = angle + offsetAngle + (i * Math.PI) / 2;
                        context.save();
                        context.translate(hubX, hubY);
                        context.rotate(bladeAngle);

                        // Blade shape
                        const tipOffset = BLADE_LENGTH - 8;
                        context.fillStyle = `rgba(55,60,68,${alpha})`;
                        context.beginPath();
                        context.moveTo(14, -BLADE_WIDTH / 2);
                        context.lineTo(tipOffset - 8, -BLADE_WIDTH / 2 + 0.5);
                        context.quadraticCurveTo(tipOffset + 6, -BLADE_WIDTH / 2 + 1, tipOffset + 12, -2);
                        context.quadraticCurveTo(tipOffset + 10, 3, tipOffset, BLADE_WIDTH / 2 - 1);
                        context.lineTo(16, BLADE_WIDTH / 2);
                        context.quadraticCurveTo(8, 0, 14, -BLADE_WIDTH / 2);
                        context.fill();

                        // Blade highlight
                        context.fillStyle = `rgba(180,190,200,${alpha * 0.5})`;
                        context.beginPath();
                        context.moveTo(18, -BLADE_WIDTH / 2 + 2);
                        context.lineTo(tipOffset - 10, -BLADE_WIDTH / 2 + 2.5);
                        context.quadraticCurveTo(tipOffset + 4, -BLADE_WIDTH / 2 + 2, tipOffset + 8, -1);
                        context.quadraticCurveTo(tipOffset + 5, 1.5, tipOffset - 4, BLADE_WIDTH / 2 - 2);
                        context.lineTo(20, BLADE_WIDTH / 2 - 1);
                        context.quadraticCurveTo(12, 0, 18, -BLADE_WIDTH / 2 + 2);
                        context.fill();

                        // Tip cap
                        context.fillStyle = `rgba(200,210,220,${alpha * 0.7})`;
                        context.beginPath();
                        context.arc(tipOffset + 7, -0.5, 4.5, -0.4, 0.8);
                        context.fill();

                        context.restore();
                    }
                }

                // ── ROTOR HUB ──
                const hubGrad = context.createRadialGradient(hubX, hubY, 2, hubX, hubY, 13);
                hubGrad.addColorStop(0, '#888');
                hubGrad.addColorStop(0.5, '#555');
                hubGrad.addColorStop(1, '#333');
                context.fillStyle = hubGrad;
                context.beginPath();
                context.arc(hubX, hubY, 12, 0, Math.PI * 2);
                context.fill();
                context.fillStyle = '#444';
                context.beginPath();
                context.arc(hubX, hubY, 5, 0, Math.PI * 2);
                context.fill();
                context.fillStyle = '#666';
                context.beginPath();
                context.arc(hubX, hubY, 2.5, 0, Math.PI * 2);
                context.fill();

                context.restore();
            }

            function drawTailRotor(context, cx, cy) {
                const tailRotorX = cx - 167;
                const tailRotorY = cy - 38;

                context.save();

                // Fast-spinning disc
                const discGrad = context.createRadialGradient(tailRotorX, tailRotorY, 2, tailRotorX, tailRotorY, 14);
                discGrad.addColorStop(0, 'rgba(180,190,200,0.1)');
                discGrad.addColorStop(0.5, 'rgba(160,175,190,0.45)');
                discGrad.addColorStop(0.85, 'rgba(140,155,170,0.55)');
                discGrad.addColorStop(1, 'rgba(130,145,160,0.15)');
                context.fillStyle = discGrad;
                context.beginPath();
                context.arc(tailRotorX, tailRotorY, 14, 0, Math.PI * 2);
                context.fill();

                // Hub
                context.fillStyle = '#555';
                context.beginPath();
                context.arc(tailRotorX, tailRotorY, 3.5, 0, Math.PI * 2);
                context.fill();
                context.fillStyle = '#333';
                context.beginPath();
                context.arc(tailRotorX, tailRotorY, 1.8, 0, Math.PI * 2);
                context.fill();

                context.restore();
            }

            function drawGroundShadow(context, cx, groundY, heliActualY, rotorWashIntensity) {
                const heightAboveGround = groundY - (heliActualY + 52);
                const shadowScale = 1 + rotorWashIntensity * 0.5;
                const shadowOpacity = Math.max(0.08, 0.55 - (heightAboveGround / LIFT_OFF_HEIGHT) * 0.5 - rotorWashIntensity *
                    0.2);
                const shadowWidth = 130 * shadowScale;
                const shadowHeight = 18 * shadowScale;

                const shadowGrad = context.createRadialGradient(cx, groundY, shadowWidth * 0.2, cx, groundY, shadowWidth *
                0.7);
                shadowGrad.addColorStop(0, `rgba(20,15,10,${shadowOpacity})`);
                shadowGrad.addColorStop(0.5, `rgba(20,15,10,${shadowOpacity * 0.7})`);
                shadowGrad.addColorStop(1, 'rgba(20,15,10,0)');

                context.fillStyle = shadowGrad;
                context.beginPath();
                context.ellipse(cx, groundY, shadowWidth * 0.7, shadowHeight, 0, 0, Math.PI * 2);
                context.fill();

                // Secondary softer shadow from rotor wash
                if (rotorWashIntensity > 0.4) {
                    const washShadowOpacity = (rotorWashIntensity - 0.4) * 0.3;
                    const washGrad = context.createRadialGradient(cx, groundY, shadowWidth * 0.5, cx, groundY, shadowWidth *
                    1.3);
                    washGrad.addColorStop(0, `rgba(30,25,18,${washShadowOpacity * 0.6})`);
                    washGrad.addColorStop(1, 'rgba(30,25,18,0)');
                    context.fillStyle = washGrad;
                    context.beginPath();
                    context.ellipse(cx, groundY, shadowWidth * 1.3, shadowHeight * 1.8, 0, 0, Math.PI * 2);
                    context.fill();
                }
            }

            // ──────────────────────────────────────
            // BACKGROUND DRAWING
            // ──────────────────────────────────────
            function drawBackground(context) {
                // Sky gradient
                const skyGrad = context.createLinearGradient(0, 0, 0, GROUND_Y);
                skyGrad.addColorStop(0, '#7ec8e3');
                skyGrad.addColorStop(0.35, '#b5ddf0');
                skyGrad.addColorStop(0.7, '#d4eaf7');
                skyGrad.addColorStop(0.95, '#e8f2f8');
                skyGrad.addColorStop(1, '#dce8ef');
                context.fillStyle = skyGrad;
                context.fillRect(0, 0, W, GROUND_Y);

                // Subtle clouds
                drawCloud(context, 150, 100, 0.7);
                drawCloud(context, 680, 70, 0.5);
                drawCloud(context, 820, 150, 0.6);
                drawCloud(context, 300, 55, 0.45);
                drawCloud(context, 550, 130, 0.35);

                // Distant hills
                context.fillStyle = '#c8d9c0';
                context.beginPath();
                context.moveTo(0, GROUND_Y);
                context.quadraticCurveTo(200, GROUND_Y - 40, 350, GROUND_Y - 15);
                context.quadraticCurveTo(500, GROUND_Y - 55, 650, GROUND_Y - 20);
                context.quadraticCurveTo(800, GROUND_Y - 35, 1000, GROUND_Y - 10);
                context.lineTo(1000, GROUND_Y);
                context.closePath();
                context.fill();

                // Ground
                const groundGrad = context.createLinearGradient(0, GROUND_Y, 0, H);
                groundGrad.addColorStop(0, '#c4b8a8');
                groundGrad.addColorStop(0.04, '#bfb39f');
                groundGrad.addColorStop(0.15, '#b5a892');
                groundGrad.addColorStop(0.5, '#a89880');
                groundGrad.addColorStop(1, '#8c7b65');
                context.fillStyle = groundGrad;
                context.fillRect(0, GROUND_Y, W, H - GROUND_Y);

                // Ground texture
                context.fillStyle = 'rgba(0,0,0,0.03)';
                for (let i = 0; i < 60; i++) {
                    const gx = (i * 163 + 41) % W;
                    const gy = GROUND_Y + 5 + (i * 73) % (H - GROUND_Y - 20);
                    context.beginPath();
                    context.arc(gx, gy, 1 + (i % 3), 0, Math.PI * 2);
                    context.fill();
                }

                // Helipad
                const padCx = HELI_INITIAL_CX;
                const padCy = GROUND_Y;
                const padGrad = context.createRadialGradient(padCx, padCy, 30, padCx, padCy, 140);
                padGrad.addColorStop(0, '#c8bfb2');
                padGrad.addColorStop(0.7, '#b8ad9c');
                padGrad.addColorStop(1, '#a39582');
                context.fillStyle = padGrad;
                context.beginPath();
                context.ellipse(padCx, padCy, 140, 25, 0, 0, Math.PI * 2);
                context.fill();

                // Helipad border ring
                context.strokeStyle = 'rgba(255,255,255,0.45)';
                context.lineWidth = 3;
                context.beginPath();
                context.ellipse(padCx, padCy, 115, 20, 0, 0, Math.PI * 2);
                context.stroke();
                context.strokeStyle = 'rgba(100,80,60,0.3)';
                context.lineWidth = 1.5;
                context.beginPath();
                context.ellipse(padCx, padCy, 125, 22, 0, 0, Math.PI * 2);
                context.stroke();

                // H marking
                context.fillStyle = 'rgba(255,255,255,0.7)';
                context.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.fillText('H', padCx, padCy - 1);

                // Helipad dashed circle
                context.setLineDash([8, 14]);
                context.strokeStyle = 'rgba(255,255,255,0.35)';
                context.lineWidth = 1.5;
                context.beginPath();
                context.ellipse(padCx, padCy, 95, 16, 0, 0, Math.PI * 2);
                context.stroke();
                context.setLineDash([]);
            }

            function drawCloud(context, x, y, scale) {
                context.save();
                context.translate(x, y);
                context.scale(scale, scale);
                context.fillStyle = 'rgba(255,255,255,0.7)';
                context.beginPath();
                context.arc(0, 0, 30, 0, Math.PI * 2);
                context.arc(28, -8, 22, 0, Math.PI * 2);
                context.arc(50, 2, 26, 0, Math.PI * 2);
                context.arc(18, 8, 20, 0, Math.PI * 2);
                context.arc(-15, 3, 18, 0, Math.PI * 2);
                context.fill();
                context.fillStyle = 'rgba(255,255,255,0.45)';
                context.beginPath();
                context.arc(8, -12, 24, 0, Math.PI * 2);
                context.arc(38, -4, 18, 0, Math.PI * 2);
                context.fill();
                context.restore();
            }

            // ──────────────────────────────────────
            // MAIN ANIMATION LOOP
            // ──────────────────────────────────────
            let lastTime = performance.now();

            function animate(timestamp) {
                const dt = Math.min((timestamp - lastTime) / 1000, 0.1); // Cap at 100ms
                lastTime = timestamp;
                time += dt;
                phaseTimer += dt;

                // ── PHASE MANAGEMENT ──
                const phaseConfig = phases[currentPhase];
                if (phaseTimer >= phaseConfig.duration && phaseConfig.next !== currentPhase) {
                    setPhase(phaseConfig.next);
                }

                // ── UPDATE ROTOR SPEED BASED ON PHASE ──
                switch (currentPhase) {
                    case 'idle':
                        targetRotorSpeed = 0.02;
                        break;
                    case 'spooling':
                        const spoolProgress = phaseTimer / phases.spooling.duration;
                        targetRotorSpeed = 0.02 + (MAX_ROTOR_SPEED - 0.02) * easeInOutCubic(spoolProgress);
                        break;
                    case 'fullPower':
                        targetRotorSpeed = MAX_ROTOR_SPEED;
                        break;
                    case 'shaking':
                        targetRotorSpeed = MAX_ROTOR_SPEED;
                        break;
                    case 'liftOff':
                        targetRotorSpeed = MAX_ROTOR_SPEED * 1.02;
                        break;
                    case 'hovering':
                        targetRotorSpeed = MAX_ROTOR_SPEED * 0.98;
                        break;
                    default:
                        targetRotorSpeed = MAX_ROTOR_SPEED;
                }

                // Smooth rotor speed transition
                const speedSmoothing = 2.5;
                rotorSpeed += (targetRotorSpeed - rotorSpeed) * Math.min(speedSmoothing * dt * 4, 1);

                // Update angles
                rotorAngle += rotorSpeed;
                tailRotorAngle += rotorSpeed * TAIL_ROTOR_SPEED_MULT;

                // ── BLUR FACTOR ──
                const blurFactor = Math.max(0, Math.min(1, (rotorSpeed - 0.04) / (MAX_ROTOR_SPEED - 0.04)));

                // ── ROTOR WASH INTENSITY ──
                const rotorWashIntensity = Math.max(0, Math.min(1, (rotorSpeed - 0.06) / (MAX_ROTOR_SPEED - 0.06)));

                // ── SHAKE ──
                if (currentPhase === 'shaking' || currentPhase === 'fullPower') {
                    const shakeTarget = currentPhase === 'shaking' ?
                        rotorWashIntensity * 4.5 :
                        rotorWashIntensity * 3.0;
                    shakeAmplitude += (shakeTarget - shakeAmplitude) * Math.min(dt * 6, 1);
                } else if (currentPhase === 'liftOff') {
                    const liftShake = 5.0 * (1 - liftOffProgress) + 2.5 * liftOffProgress;
                    shakeAmplitude += (liftShake - shakeAmplitude) * Math.min(dt * 5, 1);
                } else if (currentPhase === 'hovering') {
                    shakeAmplitude += (1.8 - shakeAmplitude) * Math.min(dt * 3, 1);
                } else {
                    shakeAmplitude += (0 - shakeAmplitude) * Math.min(dt * 4, 1);
                }

                // ── LIFT-OFF ──
                if (currentPhase === 'liftOff') {
                    liftOffActive = true;
                    liftOffProgress = phaseTimer / phases.liftOff.duration;
                    const easedProgress = easeInOutQuad(liftOffProgress);
                    const targetY = HELI_INITIAL_CY - LIFT_OFF_HEIGHT * easedProgress;
                    verticalVelocity = (targetY - heliY) * Math.min(dt * 8, 1);
                    heliY += verticalVelocity;
                    if (heliY < targetY - 0.5 && liftOffProgress < 0.95) {
                        heliY += (targetY - heliY) * dt * 5;
                    }
                } else if (currentPhase === 'hovering') {
                    liftOffActive = true;
                    liftOffProgress = 1;
                    const targetY = HELI_INITIAL_CY - LIFT_OFF_HEIGHT;
                    heliY += (targetY - heliY) * Math.min(dt * 2, 1);
                    // Gentle hover bob
                    heliY += Math.sin(time * 1.8) * 0.6;
                } else if (!liftOffActive) {
                    heliY = HELI_INITIAL_CY;
                    verticalVelocity = 0;
                    liftOffProgress = 0;
                }

                // ── COMPUTE SHAKE OFFSET ──
                const shakeX = Math.sin(time * 47.3 + 0.7) * shakeAmplitude * 0.55 +
                    Math.sin(time * 73.1 + 2.1) * shakeAmplitude * 0.3 +
                    (Math.random() - 0.5) * shakeAmplitude * 0.35;
                const shakeY = Math.cos(time * 53.7 + 1.1) * shakeAmplitude * 0.5 +
                    Math.cos(time * 67.9 + 3.4) * shakeAmplitude * 0.35 +
                    (Math.random() - 0.5) * shakeAmplitude * 0.3;

                const drawX = heliX + shakeX;
                const drawY = heliY + shakeY;

                // ── SPAWN DUST PARTICLES ──
                const dustSpawnRate = rotorWashIntensity * 45;
                const particlesToSpawn = Math.floor(dustSpawnRate * dt * 60);
                for (let i = 0; i < particlesToSpawn; i++) {
                    const spawnX = heliX + (Math.random() - 0.5) * 180 * rotorWashIntensity;
                    const spawnY = GROUND_Y;
                    particles.push(spawnDustParticle(spawnX, spawnY, rotorWashIntensity));
                }

                // Extra dust burst during early lift-off
                if (currentPhase === 'liftOff' && liftOffProgress < 0.3) {
                    const burstRate = 30 * (1 - liftOffProgress / 0.3);
                    const burstCount = Math.floor(burstRate * dt * 60);
                    for (let i = 0; i < burstCount; i++) {
                        const spawnX = heliX + (Math.random() - 0.5) * 220;
                        particles.push(spawnDustParticle(spawnX, GROUND_Y, 1.5));
                    }
                }

                // ── SPAWN EXHAUST SMOKE ──
                if (rotorWashIntensity > 0.5) {
                    const smokeRate = rotorWashIntensity * 8;
                    const smokeCount = Math.floor(smokeRate * dt * 60);
                    for (let i = 0; i < smokeCount; i++) {
                        const exhaustX = drawX - 38;
                        const exhaustY = drawY - 10;
                        smokeParticles.push(spawnSmokeParticle(exhaustX, exhaustY));
                    }
                }

                // ── UPDATE PARTICLES ──
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt * 60;
                    p.y += p.vy * dt * 60;
                    p.vy += 0.15 * dt * 60; // gravity
                    p.life -= dt;
                    if (p.life <= 0 || p.y > GROUND_Y + 30 || p.opacity <= 0.01) {
                        particles.splice(i, 1);
                    }
                }
                for (let i = smokeParticles.length - 1; i >= 0; i--) {
                    const p = smokeParticles[i];
                    p.x += p.vx * dt * 60;
                    p.y += p.vy * dt * 60;
                    p.size += 0.3 * dt * 60;
                    p.life -= dt;
                    if (p.life <= 0 || p.size > 30) {
                        smokeParticles.splice(i, 1);
                    }
                }

                // Limit particles
                if (particles.length > 300) particles.splice(0, particles.length - 300);
                if (smokeParticles.length > 80) smokeParticles.splice(0, smokeParticles.length - 80);

                // ── RENDER ──
                ctx.clearRect(0, 0, W, H);

                // Background
                drawBackground(ctx);

                // Ground shadow (drawn before helicopter)
                drawGroundShadow(ctx, heliX, GROUND_Y, heliY, rotorWashIntensity);

                // Dust particles (behind helicopter)
                for (const p of particles) {
                    const alpha = (p.life / p.maxLife) * p.opacity;
                    if (alpha < 0.01) continue;
                    const size = p.size * (0.6 + 0.4 * (p.life / p.maxLife));
                    ctx.fillStyle = `rgba(${p.color.r},${p.color.g},${p.color.b},${alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Exhaust smoke
                for (const p of smokeParticles) {
                    const alpha = (p.life / p.maxLife) * p.opacity;
                    if (alpha < 0.01) continue;
                    const smokeGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    smokeGrad.addColorStop(0, `rgba(${p.color.r},${p.color.g},${p.color.b},${alpha})`);
                    smokeGrad.addColorStop(1, 'rgba(180,175,165,0)');
                    ctx.fillStyle = smokeGrad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw helicopter body
                drawHelicopterBody(ctx, drawX, drawY);

                // Draw tail rotor
                drawTailRotor(ctx, drawX, drawY);

                // Draw main rotor
                drawMainRotor(ctx, drawX, drawY, rotorAngle, rotorSpeed, blurFactor);

                // ── FOREGROUND DUST (in front of helicopter, close to ground) ──
                for (const p of particles) {
                    if (p.y < GROUND_Y - 5) continue; // Only ground-hugging particles in front
                    const alpha = (p.life / p.maxLife) * p.opacity * 0.7;
                    if (alpha < 0.01) continue;
                    const size = p.size * 0.8;
                    ctx.fillStyle = `rgba(${p.color.r},${p.color.g},${p.color.b},${alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, Math.min(p.y, GROUND_Y), size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // ── SUBTLE GROUND GLOW FROM ROTOR WASH ──
                if (rotorWashIntensity > 0.6) {
                    const glowAlpha = (rotorWashIntensity - 0.6) * 0.25;
                    const glowGrad = ctx.createRadialGradient(heliX, GROUND_Y, 30, heliX, GROUND_Y, 160);
                    glowGrad.addColorStop(0, `rgba(240,235,220,${glowAlpha})`);
                    glowGrad.addColorStop(1, 'rgba(240,235,220,0)');
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.ellipse(heliX, GROUND_Y, 160, 30, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                // ── HUD-STYLE RPM INDICATOR ──
                const rpmPercent = Math.round((rotorSpeed / MAX_ROTOR_SPEED) * 100);
                const indicatorX = W - 90;
                const indicatorY = 45;
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.beginPath();
                ctx.roundRect(indicatorX - 35, indicatorY - 14, 70, 36, 8);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = '600 11px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('ROTOR', indicatorX, indicatorY - 2);
                ctx.fillText(`${rpmPercent}%`, indicatorX, indicatorY + 14);
                // Mini bar
                const barWidth = 50;
                const barHeight = 4;
                const barX = indicatorX - barWidth / 2;
                const barY = indicatorY + 20;
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(barX, barY, barWidth, barHeight);
                const fillColor = rpmPercent > 90 ? '#ff6b4a' : rpmPercent > 60 ? '#ffb347' : '#4ecb71';
                ctx.fillStyle = fillColor;
                ctx.fillRect(barX, barY, barWidth * (rpmPercent / 100), barHeight);
                if (rpmPercent >= 95) {
                    ctx.fillStyle = '#ff3b1f';
                    ctx.fillRect(barX, barY, barWidth * (rpmPercent / 100), barHeight);
                }

                requestAnimationFrame(animate);
            }

            // ──────────────────────────────────────
            // EASING FUNCTIONS
            // ──────────────────────────────────────
            function easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            function easeInOutQuad(t) {
                return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            }

            // ──────────────────────────────────────
            // INITIALIZATION
            // ──────────────────────────────────────
            setPhase('idle');
            phaseTimer = 0;
            rotorSpeed = 0.015;
            rotorAngle = Math.random() * Math.PI * 2;
            heliY = HELI_INITIAL_CY;
            heliX = HELI_INITIAL_CX;

            // Draw initial frame
            ctx.clearRect(0, 0, W, H);
            drawBackground(ctx);
            drawGroundShadow(ctx, heliX, GROUND_Y, heliY, 0);
            drawHelicopterBody(ctx, heliX, heliY);
            drawTailRotor(ctx, heliX, heliY);
            drawMainRotor(ctx, heliX, heliY, rotorAngle, rotorSpeed, 0);

            // Start animation loop
            lastTime = performance.now();
            requestAnimationFrame(animate);

            console.log('🚁 Helicopter animation ready!');
            console.log('   Phases: Idle → Spooling → Full Power → Shaking → Lift Off → Hovering');
            console.log('   Watch the rotor spin up, dust kick up, and the helicopter take off vertically!');
        })();
    </script>
